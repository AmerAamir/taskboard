name: PR Validation

on:
  pull_request:
    branches:
      - dev
      - qa
      - main

permissions:
  contents: read

env:
  COMPOSE_PROJECT_NAME: taskboard-ci
  BACKEND_LOCAL_IMAGE: taskboard-backend:ci
  FRONTEND_LOCAL_IMAGE: taskboard-frontend:ci
  VITE_API_URL: http://localhost:4000

jobs:
  compose-validation:
    name: Build and test Docker Compose stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Create safe CI environment file
        run: |
          cat > .env.compose <<'EOF'
          NODE_ENV=test
          PORT=4000
          BACKEND_PORT=4000

          POSTGRES_USER=taskboard
          POSTGRES_PASSWORD=taskboard_ci_password
          POSTGRES_DB=taskboard
          POSTGRES_HOST=db
          POSTGRES_PORT=5432

          DATABASE_HOST=db
          DATABASE_PORT=5432
          DATABASE_USER=taskboard
          DATABASE_PASSWORD=taskboard_ci_password
          DATABASE_NAME=taskboard
          DATABASE_URL=postgresql://taskboard:taskboard_ci_password@db:5432/taskboard

          VITE_API_URL=http://localhost:4000
          EOF

      - name: Build backend Docker image
        run: |
          docker build \
            -t "$BACKEND_LOCAL_IMAGE" \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL="$VITE_API_URL" \
            -t "$FRONTEND_LOCAL_IMAGE" \
            ./frontend

      - name: Start full stack with Docker Compose
        run: |
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            --env-file .env.compose \
            up -d --build

      - name: Show running containers
        run: |
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            --env-file .env.compose \
            ps

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health; then
              echo "Backend health endpoint is ready."
              exit 0
            fi

            echo "Waiting for backend health endpoint... attempt $i"
            sleep 2
          done

          echo "Backend health endpoint did not become ready."
          exit 1

      - name: Check backend readiness endpoint
        run: |
          curl -fsS http://localhost:4000/ready

      - name: Check tasks API endpoint
        run: |
          curl -fsS http://localhost:4000/api/tasks

      - name: Show Docker Compose logs on failure
        if: failure()
        run: |
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            --env-file .env.compose \
            ps

          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            --env-file .env.compose \
            logs --no-color

      - name: Clean up Docker Compose resources
        if: always()
        run: |
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            --env-file .env.compose \
            down --volumes --remove-orphans
